name: ai-stats
options:
  bundleIdPrefix: com.sergeytovarov
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: NO
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: YES
    DEVELOPMENT_TEAM: ""
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"
targets:
  StatsApp:
    type: application
    platform: macOS
    sources:
      - path: StatsApp
      - path: Shared
    dependencies:
      - package: GRDB
        product: GRDB
      - target: StatsWidget
        embed: true
    info:
      path: StatsApp/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        CFBundleDisplayName: Burn
        CFBundleName: Burn
        CFBundleShortVersionString: "0.4.3"
        CFBundleVersion: "7"
        NSHumanReadableCopyright: "Sergey Tovarov, MIT"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations: [en, ru]
    entitlements:
      path: StatsApp/StatsApp.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sergeytovarov.aistats
        PRODUCT_NAME: Burn
        PRODUCT_MODULE_NAME: StatsApp
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: StatsApp/StatsApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  StatsWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: StatsWidget
      - path: Shared
    dependencies:
      - package: GRDB
        product: GRDB
    info:
      path: StatsWidget/Info.plist
      properties:
        CFBundleDisplayName: Burn Widget
        CFBundleShortVersionString: "0.4.3"
        CFBundleVersion: "7"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: StatsWidget/StatsWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sergeytovarov.aistats.widget
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: StatsWidget/StatsWidget.entitlements
        SKIP_INSTALL: YES

  StatsAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/StatsAppTests
        excludes:
          - "Fixtures/**"
      - path: Tests/StatsAppTests/Fixtures/ccusage-claude-daily.json
        buildPhase: resources
      - path: Tests/StatsAppTests/Fixtures/github-response.json
        buildPhase: resources
      - path: Tests/StatsAppTests/Fixtures/ccusage-codex-daily.json
        buildPhase: resources
      - path: Tests/StatsAppTests/Fixtures/github-commit-history.json
        buildPhase: resources
    dependencies:
      - target: StatsApp
      - package: GRDB
        product: GRDB
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Burn.app/Contents/MacOS/Burn"
        GENERATE_INFOPLIST_FILE: YES
